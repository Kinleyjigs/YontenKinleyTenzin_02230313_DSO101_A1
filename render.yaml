services:
  # Backend Web Service
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: todo_db
      - key: DB_PORT
        value: 5432
      - key: PORT
        value: 5000

  # Frontend Web Service
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: be-todo
          envVarKey: RENDER_EXTERNAL_URL

# Database (PostgreSQL)
databases:
  - name: todo-db
    databaseName: todo_db
    user: todo_user
